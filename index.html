<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>抽卡活動</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero card">
      <div class="badge" id="appBadge">博愛皮克敏之友團建活動🍄</div>
      <h1 id="appTitle">皮克敏...的好朋友</h1>
      <h1 id="appTitle">超級瑪利歐銀河觀影會座位抽取</h1>
      <p id="appSubtitle">輸入暱稱後按下按鈕後會抽出一張卡片，並翻面顯示結果。</p>
    </section>

    <section class="card controls">
      <label class="label" for="nameInput">抽卡者名字</label>
      <input id="nameInput" type="text" placeholder="例如：西瓜妹" />
      <button id="drawBtn" class="primary-btn">開始抽卡</button>
      <div class="action-row">
        <button id="undoBtn" class="secondary-btn">撤銷上一筆</button>
        <button id="resetBtn" class="danger-btn">全部重置</button>
      </div>
    </section>

    <section class="card stats">
      <div class="stat"><div class="value" id="totalCount">0</div><div class="caption">總卡數</div></div>
      <div class="stat"><div class="value" id="remainingCount">0</div><div class="caption">剩餘</div></div>
      <div class="stat"><div class="value" id="drawnCount">0</div><div class="caption">已抽</div></div>
    </section>

    <section class="card reveal">
      <div class="section-title">本次結果</div>
      <div class="draw-stage">
        <div class="deck-shadow"></div>
        <div class="deck-stack">
          <div class="deck-card deck-card-3"></div>
          <div class="deck-card deck-card-2"></div>
          <div class="deck-card deck-card-1"></div>
        </div>

        <div class="draw-card" id="drawCard">
          <div class="draw-card-inner" id="drawCardInner">
            <div class="draw-face draw-back">
              <img id="cardBackImage" class="back-image" alt="card back" />
              <div class="back-glow"></div>
              <div class="back-text">DRAW</div>
            </div>
            <div class="draw-face draw-front">
              <div class="result-image-wrap">
                <img id="resultImage" alt="result image" />
              </div>
              <div class="result-title" id="resultTitle">Ready</div>
              <div class="result-subtitle" id="resultSubtitle">尚未抽卡</div>
              <div class="result-owner" id="resultOwner">請先輸入名字</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card history">
      <div class="section-title">抽卡紀錄</div>
      <div id="historyList" class="history-list">
        <div class="empty">目前還沒有抽卡紀錄。</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
